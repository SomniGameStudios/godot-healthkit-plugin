name: Release
run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string
      godot_version:
        description: 'Godot version (e.g. 4.6.1)'
        required: false
        default: '4.6.1'
        type: string

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install scons
        run: pip install scons

      - name: Build plugin
        run: ./platforms/ios/scripts/build.sh ${{ inputs.godot_version }}

      - name: Package release zip
        run: |
          mkdir -p package/addons/healthkit_plugin/demo
          
          # 1. Copy plugin files (API classes)
          cp platforms/godot_editor/addons/healthkit_plugin/*.gd package/addons/healthkit_plugin/
          cp platforms/godot_editor/addons/healthkit_plugin/*.cfg package/addons/healthkit_plugin/
          
          # 2. Copy compiled native binaries
          cp -r platforms/ios/build/output/HealthKitPlugin package/addons/healthkit_plugin/
          cp platforms/ios/build/output/HealthKitPlugin.gdip package/addons/healthkit_plugin/
          
          # 3. Copy demo files
          cp platforms/godot_editor/main.tscn package/addons/healthkit_plugin/demo/
          cp platforms/godot_editor/main.gd package/addons/healthkit_plugin/demo/
          cp platforms/godot_editor/icon.svg package/addons/healthkit_plugin/demo/
          cp -r platforms/godot_editor/scenes package/addons/healthkit_plugin/demo/
          
          # Zip the package
          cd package
          zip -r "${{ github.workspace }}/HealthKitPlugin-${{ inputs.version }}-godot${{ inputs.godot_version }}.zip" addons

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "HealthKitPlugin v${{ inputs.version }} (Godot ${{ inputs.godot_version }})" \
            --generate-notes \
            "HealthKitPlugin-${{ inputs.version }}-godot${{ inputs.godot_version }}.zip"
