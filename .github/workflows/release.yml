name: Release
run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string
      godot_version:
        description: 'Godot version (e.g. 4.6.1)'
        required: false
        default: '4.6.1'
        type: string

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install scons
        run: pip install scons

      - name: Build plugin
        run: ./HealthKitPlugin/scripts/build.sh ${{ inputs.godot_version }}

      - name: Package release zip
        run: |
          cd platforms/ios/build/output
          zip -r "${{ github.workspace }}/HealthKitPlugin-${{ inputs.version }}-godot${{ inputs.godot_version }}.zip" .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "HealthKitPlugin v${{ inputs.version }} (Godot ${{ inputs.godot_version }})" \
            --generate-notes \
            "HealthKitPlugin-${{ inputs.version }}-godot${{ inputs.godot_version }}.zip"
