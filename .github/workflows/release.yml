#        run: |
#          cd docs
#          npm ci
#          # Run versioning. We use || true to avoid crashing if the version already exists.
#          # If it exists, Docusaurus handles updates by you making changes directly to the versioned_docs folder!
#          npm run docusaurus docs:version ${{ inputs.version }} || true
#          
#          # Setup git config for the bot
#          git config --global user.name "github-actions[bot]"
#          git config --global user.email "github-actions[bot]@users.noreply.github.com"
#          
#          # Add the newly created version files
#          git add .
#          
