name: Release
run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string
      godot_version:
        description: 'Godot version (e.g. 4.6.1)'
        required: false
        default: '4.6.1'
        type: string

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install scons
        run: pip install scons

      - name: Build plugin
        run: ./platforms/ios/scripts/build.sh ${{ inputs.godot_version }}

#      - name: Setup Node.js (For Docs Versioning)
#        uses: actions/setup-node@v4
#        with:
#          node-version: 20
#          cache: 'npm'
#          cache-dependency-path: './docs/package-lock.json'
#
