#          # Run versioning. We use || true to avoid crashing if the version already exists.
#          # If it exists, Docusaurus handles updates by you making changes directly to the versioned_docs folder!
#          npm run docusaurus docs:version ${{ steps.get_version.outputs.version }} || true
#          
