name: Release

on:
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Godot version (e.g. 4.6.1)'
        required: false
        default: '4.6.1'
        type: string

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from plugin.cfg
        id: get_version
        run: |
          VERSION=$(grep "version=" platforms/godot_editor/addons/healthkit_plugin/plugin.cfg | sed 's/version="//;s/"//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if version already exists
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "Error: Version v${{ steps.get_version.outputs.version }} already exists in git tags."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install scons
        run: pip install scons

      - name: Build plugin
        run: ./platforms/ios/scripts/build.sh ${{ inputs.godot_version }}

#      - name: Setup Node.js (For Docs Versioning)
#        uses: actions/setup-node@v4
#        with:
